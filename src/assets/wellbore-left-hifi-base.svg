<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" fill="none">
  <defs>
    <linearGradient id="soilA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5E9D7"/>
      <stop offset="100%" stop-color="#E2CFB0"/>
    </linearGradient>
    <linearGradient id="soilB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECD7B7"/>
      <stop offset="100%" stop-color="#D8B88F"/>
    </linearGradient>
    <linearGradient id="soilC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D9AF80"/>
      <stop offset="100%" stop-color="#BE8A60"/>
    </linearGradient>
    <linearGradient id="soilD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BE8C63"/>
      <stop offset="100%" stop-color="#996A48"/>
    </linearGradient>
    <linearGradient id="casingSteel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDF3F8"/>
      <stop offset="48%" stop-color="#A6B8C6"/>
      <stop offset="100%" stop-color="#6F8294"/>
