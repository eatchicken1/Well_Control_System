    <pattern id="diag" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M0 16L16 0" stroke="#7F6752" stroke-opacity="0.12"/>
      <path d="M-8 8L8 -8" stroke="#7F6752" stroke-opacity="0.06"/>
      <path d="M8 24L24 8" stroke="#7F6752" stroke-opacity="0.06"/>
    </pattern>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
