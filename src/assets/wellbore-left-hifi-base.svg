      <circle cx="13" cy="8" r="0.95" fill="#7B6249" fill-opacity="0.12"/>
      <circle cx="8" cy="14" r="0.8" fill="#7B6249" fill-opacity="0.1"/>
    </pattern>
    <pattern id="cement" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#E7EDF2"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#A3B3C1" stroke-width="1" opacity="0.42"/>
    </pattern>
    <style>
      .title{font:700 13px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#173145}
      .label{font:700 11.5px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#173145}
      .note{font:500 10px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#647487}
      .mono{font:700 10.5px 'IBM Plex Mono','Consolas',monospace;fill:#496171}
      .layer{font:700 9px 'Microsoft YaHei','PingFang SC',Arial,sans-serif;fill:#76593F;opacity:.78}
      .leader{stroke:#788C9D;stroke-width:1.06;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .axis{stroke:#9DAEBC;stroke-width:1.05}
      .major{stroke:#5E7689;stroke-width:1.35}
      .minor{stroke:#AFBFCA;stroke-width:0.9}
      .grid{stroke:#DCE5EC;stroke-width:0.9;stroke-dasharray:4 7}
      .well-outline{stroke:#4D6579;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .callout-dot{fill:#6D8192}
